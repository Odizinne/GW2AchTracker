<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GW2 Achievement Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo-group">
        <span class="logo">GW2 Achievement Tracker</span>
        <select id="tier-toggle">
          <option value="next">Next tier</option>
          <option value="last">Final tier</option>
        </select>
      </div>
      <div class="header-actions">
        <label class="theme-switch" title="Toggle theme">
          <img id="theme-icon" src="assets/moon.png" class="switch-icon" alt="" />
          <input type="checkbox" id="theme-checkbox" />
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
        <button id="btn-settings">Settings</button>
        <button id="btn-refresh" class="primary">Fetch</button>
      </div>
    </header>

    <div id="setup-panel" class="panel hidden">
      <h2>API Key Required</h2>
      <p>Generate a key at <a href="https://account.arena.net/applications" target="_blank">account.arena.net/applications</a>.<br>
      Enable the <strong>account</strong> and <strong>progression</strong> permissions.</p>
      <div class="field-row">
        <div class="api-key-wrap">
          <input type="password" id="setup-key" placeholder="Paste your API key…" />
          <button type="button" class="eye-btn" data-target="setup-key" title="Toggle visibility">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button id="btn-setup-save" class="primary">Save &amp; Continue</button>
      </div>
    </div>

    <div id="settings-panel" class="panel hidden">
      <h2>Settings</h2>
      <div class="settings-grid">
        <label class="api-key-label">API Key
          <div class="api-key-wrap">
            <input type="password" id="s-apikey" placeholder="sk-…" />
            <button type="button" class="eye-btn" data-target="s-apikey" title="Toggle visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </label>
        <label>Max results
          <input type="number" id="s-maxresults" min="1" max="200" />
        </label>
        <label>Min threshold (%)
          <input type="number" id="s-threshold" min="1" max="100" />
        </label>
        <label>Language
          <select id="s-language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>
        </label>
      </div>
      <div class="settings-actions">
        <div class="settings-cache-group">
          <button id="btn-cache-clear" class="danger">Clear cache</button>
          <span id="cache-info" class="muted"></span>
        </div>
        <div>
          <button id="btn-settings-cancel">Cancel</button>
          <button id="btn-settings-save" class="primary">Save</button>
        </div>
      </div>
    </div>

    <div id="page-spinner" class="hidden">
      <span id="status-text"></span>
    </div>

    <div id="results-panel">
      <table id="results-table">
        <thead>
          <tr>
            <th class="col-pct">%</th>
            <th class="col-prog">Progress</th>
            <th class="col-name">Achievement</th>
            <th class="col-reward">Rewards</th>
          </tr>
        </thead>
        <tbody id="results-body">
          <tr class="empty-row">
            <td colspan="4">Press <strong>Fetch</strong> to load your achievements.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
